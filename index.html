<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Caca 🎉</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* VIDEO BACKGROUND */
#bgVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
    filter: brightness(0.6);
}

/* OVERLAY */
body::before {
    content: '';
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* CONTAINER */
.container {
    text-align: center;
    z-index: 10;
}

/* COUNTDOWN */
.countdown {
    font-size: 8rem;
    color: white;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.2); }
}

/* TITLE */
.birthday-title {
    font-size: 3rem;
    color: white;
    margin-top: 20px;
    display: none;
    text-shadow: 0 0 20px #fff;
}

/* CARD */
.card-container {
    margin-top: 30px;
    display: none;
}

.card-container.active {
    display: block;
}

.birthday-card {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 30px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    transition: 0.4s;
}

.birthday-card:hover {
    transform: scale(1.05);
}

/* WISH */
.wish-content {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

/* STARS */
.star {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from {opacity: 0.2;}
    to {opacity: 1;}
}

/* CONFETTI */
@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}

/* MUSIC BUTTON */
.music-control {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 20px;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
    <source src="https://cdn.coverr.co/videos/coverr-colorful-bokeh-1576/1080p.mp4">
</video>

<button class="music-control" id="musicToggle">🎵</button>

<div class="container">
    <div class="countdown" id="countdown">3</div>

    <h1 class="birthday-title" id="birthdayTitle">
        Happy Birthday Caca 🎉🎂
    </h1>

    <div class="card-container" id="cardContainer">
        <div class="birthday-card" id="birthdayCard">
            Klik buka kartu 💌
        </div>
    </div>
</div>

<audio id="birthdaySong" loop>
    <source src="https://www.myinstants.com/media/sounds/happy-birthday-to-you.mp3">
</audio>

<script>
let countdown = 3;
const countdownEl = document.getElementById('countdown');
const title = document.getElementById('birthdayTitle');
const cardContainer = document.getElementById('cardContainer');
const card = document.getElementById('birthdayCard');
const music = document.getElementById('birthdaySong');
const toggle = document.getElementById('musicToggle');

let interacted = false;

/* COUNTDOWN */
let interval = setInterval(() => {
    countdown--;
    countdownEl.innerText = countdown;

    if (countdown < 0) {
        clearInterval(interval);
        countdownEl.style.display = 'none';
        title.style.display = 'block';

        setTimeout(() => {
            cardContainer.classList.add('active');
        }, 800);
    }
}, 1000);

/* MUSIC */
toggle.onclick = () => {
    interacted = true;
    if (music.paused) {
        music.play();
        toggle.innerText = "🔊";
    } else {
        music.pause();
        toggle.innerText = "🔇";
    }
};

/* CARD CLICK */
card.onclick = () => {
    card.innerHTML = `
        <div class="wish-content">
        🎉 Happy birthday Caca! 🎉<br><br>
        Semoga semua impian kamu tercapai, selalu bahagia, sehat,
        dan makin cantik setiap harinya ✨🥰
        </div>
    `;
    music.play();
    createConfetti();
};

/* CONFETTI */
function createConfetti() {
    for (let i = 0; i < 100; i++) {
        let el = document.createElement("div");

        el.style.position = "fixed";
        el.style.left = Math.random()*100 + "vw";
        el.style.top = "-10px";
        el.style.width = "6px";
        el.style.height = "6px";
        el.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        el.style.animation = "fall 5s linear forwards";

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5000);
    }
}

/* STARS */
for (let i = 0; i < 60; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.top = Math.random()*100 + "vh";
    s.style.left = Math.random()*100 + "vw";
    document.body.appendChild(s);
}
</script>

</body>
</html>
