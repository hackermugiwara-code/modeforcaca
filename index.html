<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Caca 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .countdown {
            font-size: 10rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            margin-bottom: 2rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .birthday-title {
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 30px rgba(255,255,255,0.9);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(50px);
            animation: slideInUp 1s ease forwards 3.5s;
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-container {
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: all 1s ease 5s;
        }

        .card-container.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .birthday-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .birthday-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .card-title {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .card-subtitle {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .wish-content {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 2rem;
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            font-family: 'Georgia', serif;
        }

        .wish-content.show {
            opacity: 1;
            transform: translateY(0);
        }

        .wish-text {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #333;
            margin-bottom: 1rem;
        }

        .wish-signature {
            font-size: 1.1rem;
            color: #666;
            font-style: italic;
        }

        .balloons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .balloon {
            position: absolute;
            width: 60px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a52);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: float 6s ease-in-out infinite;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 40px;
            background: #333;
        }
        .balloon:nth-child(1) { left: 10%; animation-delay: 0s; background: radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a52); }
        .balloon:nth-child(2) { left: 20%; animation-delay: 1s; background: radial-gradient(circle at 30% 30%, #feca57, #f39c12); }
        .balloon:nth-child(3) { left: 80%; animation-delay: 2s; background: radial-gradient(circle at 30% 30%, #ff9ff3, #e84393); }
        .balloon:nth-child(4) { left: 90%; animation-delay: 0.5s; background: radial-gradient(circle at 30% 30%, #54a0ff, #3867d6); }
        .balloon:nth-child(5) { left: 30%; animation-delay: 3s; background: radial-gradient(circle at 30% 30%, #5f27cd, #341f97); }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        @media (max-width: 768px) {
            .countdown { font-size: 6rem; }
            .birthday-title { font-size: 2.5rem; }
            .card-title { font-size: 2rem; }
            .wish-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="balloons">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
    </div>

    <button class="music-control" id="musicToggle" onclick="toggleMusic()">🎵</button>

    <div class="container">
        <div class="countdown" id="countdown">3</div>
        <h1 class="birthday-title" id="birthdayTitle">Happy Birthday Caca! 🎉🎂</h1>
        
        <div class="card-container" id="cardContainer">
            <div class="birthday-card" id="birthdayCard">
                <h2 class="card-title">Buka Kartu Ucapanmu! 💌</h2>
                <p class="card-subtitle">Klik di sini untuk melihat ucapan spesial</p>
            </div>
        </div>
    </div>

  <audio id="birthdaySong" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6d9a5f9e.mp3">
</audio>


<script>
    let countdown = 3;
    let hasOpened = false;

    const countdownEl = document.getElementById('countdown');
    const birthdayTitle = document.getElementById('birthdayTitle');
    const cardContainer = document.getElementById('cardContainer');
    let birthdayCard = document.getElementById('birthdayCard');
    const birthdaySong = document.getElementById('birthdaySong');
    const musicToggle = document.getElementById('musicToggle');

    // ================= COUNTDOWN =================
    const countdownInterval = setInterval(() => {
        countdown--;
        countdownEl.textContent = countdown;
        
        if (countdown < 0) {
            clearInterval(countdownInterval);
            countdownEl.style.display = 'none';
            birthdayTitle.style.display = 'block';
            
            setTimeout(() => {
                cardContainer.classList.add('active');
            }, 500);
        }
    }, 1000);

    // ================= TYPEWRITER =================
    function typeWriter(element, text, speed = 50) {
        let i = 0;
        element.innerHTML = '';
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    // ================= CLICK CARD =================
    birthdayCard.addEventListener('click', function() {
        if (hasOpened) return;
        hasOpened = true;

        this.innerHTML = `
            <div class="wish-content show">
                <div class="wish-text" id="wishText"></div>
                <div class="wish-signature">
                    🥰 Dari seseorang 🥰
                </div>
            </div>
        `;

        const textEl = document.getElementById('wishText');

        const message = `🎉 Happy birthday, Caca! 🎉

Another year, another chapter in your beautiful story.
May every page be filled with love, happiness, and success.

Stay amazing, stay beautiful. ✨🥰`;

        typeWriter(textEl, message, 35);

        createConfetti();
        birthdaySong.play().catch(() => {});
    });

    // ================= MUSIC =================
    function toggleMusic() {
        if (birthdaySong.paused) {
            birthdaySong.play();
            musicToggle.textContent = '🔊';
        } else {
            birthdaySong.pause();
            musicToggle.textContent = '🔇';
        }
    }

        // ================= CONFETTI =================
    function createConfetti() {
        for (let i = 0; i < 120; i++) {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.width = '8px';
            confetti.style.height = '8px';
            confetti.style.backgroundColor = randomColor();
            confetti.style.top = '-10px';
            confetti.style.left = Math.random() * window.innerWidth + 'px';
            confetti.style.opacity = Math.random();
            confetti.style.borderRadius = '50%';
            confetti.style.zIndex = '999';

            document.body.appendChild(confetti);

            let fall = Math.random() * 3 + 2;

            confetti.animate([
                { transform: 'translateY(0px) rotate(0deg)' },
                { transform: `translateY(${window.innerHeight}px) rotate(720deg)` }
            ], {
                duration: fall * 1000,
                easing: 'ease-out'
            });

            setTimeout(() => confetti.remove(), fall * 1000);
        }
    }

    function randomColor() {
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3'];
        return colors[Math.floor(Math.random() * colors.length)];
    }
</script>

</body>
</html>
