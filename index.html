<script>
let countdown = 3;
const countdownEl = document.getElementById('countdown');
const birthdayTitle = document.getElementById('birthdayTitle');
const cardContainer = document.getElementById('cardContainer');
const birthdayCard = document.getElementById('birthdayCard');
const birthdaySong = document.getElementById('birthdaySong');
const musicToggle = document.getElementById('musicToggle');

let hasInteracted = false;

// ================= TYPEWRITER =================
function typeWriter(element, text, speed = 40) {
    let i = 0;
    element.innerHTML = '';
    element.classList.add('typing-text');

    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
        } else {
            element.classList.remove('typing-text');
        }
    }
    type();
}

// ================= COUNTDOWN =================
const countdownInterval = setInterval(() => {
    countdown--;
    countdownEl.textContent = countdown;

    if (countdown < 0) {
        clearInterval(countdownInterval);
        countdownEl.style.display = 'none';
        birthdayTitle.style.display = 'block';

        setTimeout(() => {
            cardContainer.classList.add('active');
            if (hasInteracted) {
                birthdaySong.play().catch(() => {});
            }
        }, 500);
    }
}, 1000);

// ================= MUSIC =================
musicToggle.addEventListener('click', function () {
    hasInteracted = true;

    if (birthdaySong.paused) {
        birthdaySong.play().catch(() => {});
        this.textContent = '🔊';
    } else {
        birthdaySong.pause();
        this.textContent = '🔇';
    }
});

// ================= CARD OPEN =================
birthdayCard.addEventListener('click', function () {
    this.classList.add('open');

    setTimeout(() => {
        this.innerHTML = `
            <div class="wish-content show">
                <div class="wish-text" id="wishText"></div>
                <div class="wish-signature">
                    🥰 Dari seseorang 🥰
                </div>
            </div>
        `;

        const wishText = document.getElementById('wishText');

        const fullText = `🎉 Happy birthday, Caca! 🎉

Another year, another chapter in your beautiful story.
May your life always be filled with love, happiness, and success.

Stay amazing, stay beautiful. ✨🥰`;

        typeWriter(wishText, fullText, 35);
        createConfetti();

    }, 400);

    hasInteracted = true;
    birthdaySong.play().catch(() => {});
});

// ================= CONFETTI =================
function createConfetti() {
    for (let i = 0; i < 120; i++) {
        const confetti = document.createElement('div');

        const size = Math.random() * 8 + 4;

        confetti.style.cssText = `
            position: fixed;
            left: ${Math.random() * 100}vw;
            top: -10px;
            width: ${size}px;
            height: ${size * 0.4}px;
            background: hsl(${Math.random() * 360}, 80%, 60%);
            transform: rotate(${Math.random() * 360}deg);
            opacity: 0.9;
            pointer-events: none;
            z-index: 999;
            animation: fall ${Math.random() * 3 + 4}s linear forwards;
        `;

        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 7000);
    }
}

// ================= STARS =================
function createStars() {
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.classList.add('star');

        star.style.top = Math.random() * 100 + 'vh';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.animationDuration = (Math.random() * 2 + 1) + 's';

        document.body.appendChild(star);
    }
}

createStars();

// ================= AUTOPLAY FIX =================
document.addEventListener('click', function handleInteraction() {
    hasInteracted = true;

    if (birthdaySong.paused && birthdayTitle.style.display !== 'none') {
        birthdaySong.play().catch(() => {});
    }

    document.removeEventListener('click', handleInteraction);
}, { once: true });

</script>
